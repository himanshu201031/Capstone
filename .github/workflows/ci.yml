name: Capstone CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: capstone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Generate Prisma Client
      run: npm run prisma:generate --workspace=backend
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/capstone_test

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm test
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/capstone_test
        JWT_SECRET: test-secret-key

    - name: Build Frontend
      run: npm run build --workspace=frontend

    - name: Build Backend
      run: npm run build --workspace=backend